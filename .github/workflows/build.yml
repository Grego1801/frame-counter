name: Build Geode Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Geode CLI
        run: |
          wget -qO- https://raw.githubusercontent.com/geode-sdk/cli/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build for Android64
        run: geode build -p android64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frame-counter-android64.geode
          path: build-android64/*.geode
