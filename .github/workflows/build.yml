name: Build Geode Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download and Install Geode CLI
        run: |
          wget https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-linux.zip
          unzip geode-cli-v3.7.4-linux.zip
          chmod +x geode
          sudo mv geode /usr/local/bin/

      - name: Setup Geode profile and SDK
        run: |
          mkdir -p /home/runner/.geode
          rm -rf /home/runner/.geode/sdk
          
          geode profile add --name default "/home/runner/.geode/sdk" android64
          geode profile select default
          geode sdk install "/home/runner/.geode/sdk"
          
          export GEODE_SDK="/home/runner/.geode/sdk"
          geode sdk set-path "/home/runner/.geode/sdk"
          
          geode sdk install-binaries -p android64
          
          echo "GEODE_SDK=/home/runner/.geode/sdk" >> $GITHUB_ENV

      - name: Build for Android64
        run: geode build -p android64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frame-counter-android64.geode
          path: build-android64/*.geode
